name: grace-young-app

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: graceyoung-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-graceyoung}:${POSTGRES_PASSWORD:-change_me_graceyoung_db}@postgres:5432/${POSTGRES_DB:-graceyoung}
      REDIS_URL: redis://redis:6379/0
      QUEUE_BROKER_URL: redis://redis:6379/1
      QUEUE_RESULT_BACKEND: redis://redis:6379/2
      MINIO_ENDPOINT: minio:9000
      MINIO_SECURE: "false"
      MEILI_URL: http://meilisearch:7700
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
    ports:
      - "18000:8000"
    networks:
      - graceyoung-net
    healthcheck:
      test:
        - CMD-SHELL
        - >
          python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s

  client:
    build:
      context: .
      dockerfile: frontend/client/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18000}
        NEXT_PUBLIC_CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:13000}
        NEXT_PUBLIC_ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:13001}
    container_name: graceyoung-client
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18000}
      NEXT_PUBLIC_CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:13000}
      NEXT_PUBLIC_ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:13001}
    ports:
      - "13000:3000"
    networks:
      - graceyoung-net

  admin:
    build:
      context: .
      dockerfile: frontend/admin/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18000}
        NEXT_PUBLIC_CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:13000}
        NEXT_PUBLIC_ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:13001}
    container_name: graceyoung-admin
    restart: unless-stopped
    depends_on:
      - backend
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:18000}
      NEXT_PUBLIC_CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:13000}
      NEXT_PUBLIC_ADMIN_ORIGIN: ${ADMIN_ORIGIN:-http://localhost:13001}
    ports:
      - "13001:3001"
    networks:
      - graceyoung-net

networks:
  graceyoung-net:
    external: true
