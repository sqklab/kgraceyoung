name: grace-young-infra

services:
  postgres:
    image: postgres:16-alpine
    container_name: graceyoung-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-graceyoung}
      POSTGRES_USER: ${POSTGRES_USER:-graceyoung}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-graceyoung}
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-graceyoung} -d ${POSTGRES_DB:-graceyoung}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graceyoung-net

  redis:
    image: redis:7-alpine
    container_name: graceyoung-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graceyoung-net

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: graceyoung-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "19000:9000"
      - "19001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graceyoung-net

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    container_name: graceyoung-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin123};
      mc mb -p local/${MINIO_BUCKET_PRODUCTS:-grace-young-products} || true;
      mc mb -p local/${MINIO_BUCKET_REELS:-grace-young-reels} || true;
      mc mb -p local/${MINIO_BUCKET_REVIEWS:-grace-young-reviews} || true;
      mc anonymous set download local/${MINIO_BUCKET_PRODUCTS:-grace-young-products} || true;
      mc anonymous set download local/${MINIO_BUCKET_REELS:-grace-young-reels} || true;
      mc anonymous set download local/${MINIO_BUCKET_REVIEWS:-grace-young-reviews} || true;
      echo 'MinIO buckets initialized.';
      "
    restart: "no"
    networks:
      - graceyoung-net

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: graceyoung-meilisearch
    restart: unless-stopped
    environment:
      MEILI_ENV: ${MEILI_ENV:-production}
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-graceyoung_dev_master_key}
    ports:
      - "17700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - graceyoung-net

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: graceyoung-mailhog
    restart: unless-stopped
    ports:
      - "11025:1025"
      - "18025:8025"
    networks:
      - graceyoung-net

  adminer:
    image: adminer:4
    container_name: graceyoung-adminer
    restart: unless-stopped
    ports:
      - "18080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - graceyoung-net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  meili_data:

networks:
  graceyoung-net:
    external: true
